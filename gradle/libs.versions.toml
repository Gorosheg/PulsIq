[versions]
accompanistPermissions = "0.37.3"
agp = "8.13.1"
kotlin = "2.2.21"
kspPlugin = "2.1.21-2.0.1"
coreKtx = "1.17.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.12.0"
composeBom = "2025.11.01"
appcompat = "1.7.1"
jetbrainsKotlinJvm = "2.2.21"
viewmodelCompose = "2.10.0"
koin = "4.1.1"
voyager = "1.1.0-beta03"
room = "2.8.4"
lifecycleProcess = "2.10.0"
datastore = "1.2.0"
vico = "2.3.6"
uiViewbinding = "1.9.5"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
material = "1.13.0"
junitJupiter = "5.11.3"
mockito = "5.12.0"
mockitoKotlin = "5.4.0"

[libraries]
accompanistPermissions = { module = "com.google.accompanist:accompanist-permissions", version.ref = "accompanistPermissions" }
androidxCoreKtx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
androidxLifecycleRuntimeKtx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
androidxActivityCompose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }

name: Run Moscow Time Plugin

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  print-moscow-time:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run printMoscowTime task
        run: ./gradlew printMoscowTime
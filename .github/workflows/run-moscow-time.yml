name: Run Moscow Time Plugin

on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  run-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle caching
        uses: gradle/actions/setup-gradle@v4

      - name: Run printMoscowTime task
        run: |
          chmod +x ./gradlew
          ./gradlew -c settings.gradle.kts printMoscowTime --no-daemon

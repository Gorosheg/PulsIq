name: Run UiPulseStatisticGroupBuilderTest on develop

on:
  push:
    branches:
      - develop

jobs:
  run-statistics-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run UiPulseStatisticGroupBuilderTest
        run: ./gradlew test
